spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/xiaozhi?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:xiaozhi}
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 6
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      keepalive-time: 0
      leak-detection-threshold: 0
      register-mbeans: false
  data:
    redis:
      lettuce:
        pool:
          max-active: 6
          max-idle: 3
          min-idle: 0
          max-wait: 3s
      redisson:
        config: classpath:redisson-personal.yml
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 64MB

xiaozhi:
  runtime:
    knowledge-dir: ${KNOWLEDGE_DIR:data/knowledge}
    voice-sample-dir: ${VOICE_SAMPLE_DIR:data/voice-samples}
    speaker-embedding-model: ${SPEAKER_EMBEDDING_MODEL:}
  firmware:
    storage-path: ${FIRMWARE_STORAGE_PATH:data/firmware}
    max-file-size: 16MB

personal:
  reminder:
    scheduler-enabled: false
  statistics:
    zone: ${STATISTICS_ZONE:Asia/Shanghai}
